<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifecycle Marketing Hub — Sign In</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23818cf8'/><stop offset='1' stop-color='%23f97316'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='url(%23g)'/><text x='16' y='22' font-family='system-ui,sans-serif' font-size='11' font-weight='800' fill='white' text-anchor='middle'>CLM</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #818cf8;
            --accent: #f97316;
            --bg: #06101e;
            --surface: #0d1b2e;
            --border: #1a2e44;
            --text: #eef2ff;
            --muted: #6c84a2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 140% 65% at 50% 115%, rgba(249,115,22,0.13) 0%, rgba(249,115,22,0.04) 28%, transparent 52%),
                radial-gradient(ellipse 100% 55% at 50% 112%, rgba(129,140,248,0.12) 0%, rgba(129,140,248,0.04) 38%, transparent 58%);
            pointer-events: none;
        }
        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }
        .logo-badge {
            width: 38px;
            height: 38px;
            border-radius: 9px;
            background: linear-gradient(135deg, #818cf8, #f97316);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
        }
        .logo-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }
        .logo-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 1px;
        }
        h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.03em;
        }
        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 28px;
            line-height: 1.5;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: #0a1828;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            margin-bottom: 16px;
        }
        input[type="password"]:focus {
            border-color: var(--brand);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.9; }
        button:active { opacity: 0.8; }
        .error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #fca5a5;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-badge">CLM</div>
            <div>
                <div class="logo-text">Lifecycle Marketing Hub</div>
                <div class="logo-sub">Intercom Internal</div>
            </div>
        </div>
        <h1>Sign in</h1>
        <p class="subtitle">This tool is for internal use only.</p>

        <div id="error-msg" class="error" style="display:none;">Incorrect password. Try again.</div>

        <form id="login-form">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" autofocus required>
            <button type="submit" id="submit-btn">Continue →</button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const err = document.getElementById('error-msg');
            btn.textContent = 'Signing in…'; btn.disabled = true;
            err.style.display = 'none';
            try {
                const r = await fetch('/api/auth-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: document.getElementById('password').value }),
                });
                if (r.ok) {
                    window.location.href = '/';
                } else {
                    err.style.display = '';
                    btn.textContent = 'Continue →'; btn.disabled = false;
                }
            } catch(ex) {
                err.textContent = 'Network error. Try again.';
                err.style.display = '';
                btn.textContent = 'Continue →'; btn.disabled = false;
            }
        });
    </script>
</body>
</html>
